site_name: MyForge Vault 11.11
site_description: 'Superintelligent Vault — Karpathy LLM-Wiki + Johnny-Decimal + 11.11 session-orchestration'
site_url: https://myforgelabs.github.io/myforge-vault-1111/
repo_url: https://github.com/MyForgeLabs/myforge-vault-1111
repo_name: MyForgeLabs/myforge-vault-1111
edit_uri: edit/main/
copyright: 'MyForge Labs · MIT Licence'

docs_dir: docs

theme:
  name: material
  language: hu
  palette:
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Világos mód
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Sötét mód
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - hu
        - en
  # i18n suffix-mode: <name>.md = HU (default), <name>.en.md = English alternate.
  # URL layout: /myforge-vault-1111/<page>/ (HU) and /myforge-vault-1111/en/<page>/ (EN).
  # The language-switcher in the header lets visitors flip between the two.
  - i18n:
      docs_structure: suffix
      # IMPORTANT: false → strict per-locale, NO HU fallback on EN pages or
      # vice versa. Documents only appear in the locale where they exist.
      # The language-switcher hides itself for untranslated pages.
      fallback_to_default: false
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: hu
          default: true
          name: Magyar
          build: true
          nav_translations:
            Dashboard: Dashboard
            Agents: Agentek
            Demo: Demo
            Reproduction Guide: Reproduction Guide
            Knowledge Graph: Knowledge Graph
            Overview: Áttekintés
            Interactive viewer: Interaktív viewer
            Evergreen Wiki: Evergreen Wiki
            Audio Overviews: Audio áttekintések
            ADR (Decisions): ADR (Döntések)
            Meta: Meta
            Audits: Auditok
            All: Mind
            SV-meta Sessions: SV-meta sessionök
            Daily logs: Napi naplók
            Home: Bevezető
        - locale: en
          name: English
          build: true
          site_name: 'MyForge Vault 11.11'
          site_description: 'Superintelligent Vault — Karpathy LLM-Wiki + Johnny-Decimal + 11.11 session-orchestration'
  - awesome-pages
  - ezlinks:
      wikilinks: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: false
  - minify:
      minify_html: true
      minify_css: true
      minify_js: true
  - rss:
      match_path: "wiki/.*\\.en"
      date_from_meta:
        as_creation: created
        as_update: updated
      categories:
        - tags
      comments_path: "#__comments"
      feeds_filenames:
        rss_created: feed.xml
        rss_updated: feed-updated.xml
        json_created: feed.json
        json_updated: feed-updated.json
      url_parameters:
        utm_source: "myforge-vault-1111"
        utm_medium: RSS
        utm_campaign: "feed-syndication"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: '#'

# Canonical nav uses English labels; i18n plugin's nav_translations rewrites
# them into Magyar for the HU build. This keeps a single source-of-truth for
# the page tree.
nav:
  - Home: index.md
  - Dashboard: dashboard/index.html
  - Agents: agents.md
  - Reproduction Guide: reproduction-guide.md
  - Knowledge Graph:
      - Overview: wiki/vault-knowledge-graph-overview.md
      - Interactive viewer: graph/viewer.html
  - Evergreen Wiki:
      - Overview: wiki/Index.md
  - Audio Overviews: audio/Index.md
  - ADR (Decisions):
      - Overview: decisions/Index.md
  - Meta:
      - Overview: meta/index.md
  - Audits:
      - Overview: audits/Index.md
  - SV-meta Sessions:
      - Overview: sessions/Index.md
  - Daily logs:
      - Overview: daily/Index.md
