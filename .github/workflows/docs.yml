name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - "11-wiki/**"
      - "07-Decisions/**"
      - "00-Meta/**"
      - "06-Audits/**"
      - "08-Sessions/**"
      - "mkdocs.yml"
      - "README.md"
      - "AGENTS.md"
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install mkdocs-material
        run: pip install mkdocs-material mkdocs-awesome-pages-plugin pymdown-extensions
      - name: Build site
        run: mkdocs build --strict --site-dir _site
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
