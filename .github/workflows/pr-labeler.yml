name: PR Labeler

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-by-path:
    name: Label by changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  label-by-title:
    name: Label breaking-change by title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Add breaking-change label if title indicates
        uses: actions/github-script@v7
        with:
          script: |
            // Read title from the trusted GitHub context object (not interpolated
            // into shell). Safe per GitHub Security Lab guidance.
            const title = (context.payload.pull_request && context.payload.pull_request.title) || "";
            const isBreaking = /^breaking:/i.test(title) || /!:/.test(title);
            if (!isBreaking) {
              core.info("PR title does not indicate a breaking change.");
              return;
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ["breaking-change"],
            });
            core.info("Added breaking-change label.");
